<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodCourt - Student Dashboard</title>
    <link rel="stylesheet" href="../css/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="brand"><i class="fas fa-utensils"></i> FoodCourt</div>
            <nav class="nav-links">
                <button class="nav-link active" onclick="showSection('menu')">
                    <i class="fas fa-th-large"></i> <span>Menu</span>
                </button>
                <button class="nav-link" onclick="showSection('orders')">
                    <i class="fas fa-shopping-bag"></i> <span>My Orders</span>
                </button>
                <button class="nav-link" onclick="showSection('wallet')">
                    <i class="fas fa-wallet"></i> <span>Wallet</span>
                </button>
                <button class="nav-link logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </button>
            </nav>
        </aside>

        <main class="content">
            <header class="header">
                <div class="header-left">
                    <div class="greeting">
                        <h2>Welcome, <span id="studentName">Student</span></h2>
                        <p>What's on the menu today?</p>
                    </div>
                </div>
                <div class="user-actions">
                    <button class="cart-btn" onclick="viewCart()">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount" class="badge">0</span>
                    </button>
                </div>
            </header>

            <div id="menuSection">
                <div class="student-search-header">
                    <h2>Today's Menu</h2>
                    <div class="student-search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="studentMenuSearch" class="search-input"
                            placeholder="What are you craving?" onkeyup="filterStudentMenu()">
                    </div>
                </div>

                <div class="category-filters" id="categoryFilters">
                    <button class="filter-pill active" onclick="filterByCategory('all', this)">All Items</button>
                    <button class="filter-pill" onclick="filterByCategory('breakfast', this)">Breakfast</button>
                    <button class="filter-pill" onclick="filterByCategory('lunch', this)">Lunch</button>
                    <button class="filter-pill" onclick="filterByCategory('snacks', this)">Snacks</button>
                    <button class="filter-pill" onclick="filterByCategory('dinner', this)">Dinner</button>
                </div>

                <div id="menuGrid" class="food-grid"></div>
            </div>

            <div id="ordersSection" style="display:none;">
                <div class="card">
                    <h3>Order History</h3>
                    <div id="historyList" class="list-group"></div>
                </div>
            </div>

            <div id="walletSection" style="display:none;">
                <div class="card" style="text-align: center; max-width: 400px; margin: 0 auto; padding: 40px 20px;">
                    <i class="fas fa-wallet" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 15px;"></i>
                    <h3 style="color: var(--text-gray); font-weight: 500;">Current Balance</h3>

                    <h1 id="walletBalanceDisplay" style="font-size: 3.5rem; color: var(--text-dark); margin: 10px 0;">₹0
                    </h1>

                    <p style="font-size: 0.85rem; color: var(--text-gray); margin-bottom: 25px;">
                        Use your wallet balance for instant, 1-click checkouts without waiting for Razorpay!
                    </p>

                    <button class="btn" style="width: 100%; padding: 14px; font-size: 1rem; background: #10b981;"
                        onclick="startWalletRecharge()">
                        <i class="fas fa-plus-circle"></i> Add Funds
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="qrModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000;">
        <div
            style="background: white; padding: 30px; border-radius: 12px; text-align: center; max-width: 300px; margin: 20vh auto; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <h3 style="color: var(--primary); margin-bottom: 15px;">Your Order QR</h3>
            <img id="modalQrImage" src="" alt="QR Code"
                style="width: 200px; height: 200px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; padding: 10px;" />
            <br>
            <button class="btn" style="background: #666; width: 100%;"
                onclick="document.getElementById('qrModal').style.display='none'">Close</button>
        </div>
    </div>

    <div id="customAlertModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div style="background: white; padding: 30px; border-radius: 16px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <div id="customAlertIcon" style="font-size: 3.5rem; margin-bottom: 15px;"></div>
            <h3 id="customAlertTitle" style="color: var(--text-dark); margin-bottom: 10px;">Alert</h3>
            <p id="customAlertMessage" style="color: var(--text-gray); margin-bottom: 25px; font-size: 0.95rem;"></p>
            <button class="btn" style="width: 100%; border-radius: 10px; padding: 12px; font-size: 1rem;" onclick="closeCustomAlert()">Okay</button>
        </div>
    </div>

    <div id="customPromptModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div style="background: white; padding: 30px; border-radius: 16px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <div style="font-size: 3rem; color: #10b981; margin-bottom: 15px;"><i class="fas fa-coins"></i></div>
            <h3 id="customPromptTitle" style="color: var(--text-dark); margin-bottom: 10px;">Enter Amount</h3>
            
            <div style="position: relative; margin-bottom: 20px;">
                <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: var(--text-gray); font-weight: bold;">₹</span>
                <input type="number" id="customPromptInput" placeholder="500" style="width: 100%; padding: 12px 15px 12px 35px; border: 2px solid var(--border); border-radius: 10px; font-size: 1.2rem; font-weight: bold; outline: none; transition: 0.2s;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn" style="flex: 1; background: #e2e8f0; color: var(--text-gray); border-radius: 10px;" onclick="closeCustomPrompt()">Cancel</button>
                <button class="btn" style="flex: 1; background: #10b981; border-radius: 10px;" onclick="submitCustomPrompt()">Continue</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/student.js"></script>
</body>

</html>
