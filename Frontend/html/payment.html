<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - FoodCourt</title>
    <link rel="stylesheet" href="../css/payment.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>

<body>
    <div class="payment-container">
        <div class="payment-card">
            <div class="payment-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2>Secure Checkout</h2>
            <p style="color: var(--text-gray)">
                Review your items and complete payment
            </p>

            <div class="order-summary">
                <h4>Order Summary</h4>
                <div id="orderItems"></div>
            </div>

            <div class="total-section">
                <span>Total Amount</span>
                <h3><span id="payTotal">₹0</span></h3>
            </div>

            <div class="payment-options">
                <button id="walletPayBtn" type="button" class="btn btn-wallet" onclick="payWithWallet()">
                    <i class="fas fa-wallet"></i> Wallet
                </button>

                <button id="rzp-pay-btn" type="button" class="btn btn-online" onclick="processPayment()">
                    <i class="fas fa-credit-card"></i> Online
                </button>
            </div>

            <a href="student.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Edit Order
            </a>
        </div>
    </div>
    <div id="successScreen" style="
        display: none;
        text-align: center;
        margin-top: 30px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      ">
        <h2 style="color: #10b981; margin-bottom: 10px">
            <i class="fas fa-check-circle"></i> Payment Successful!
        </h2>
        <h3 style="color: #333">Order: <span id="finalOrderNumber"></span></h3>

        <img id="generatedQR" src="" alt="Your Order QR Code" style="
          width: 200px;
          height: 200px;
          border: 2px solid #eee;
          padding: 10px;
          border-radius: 10px;
          margin: 20px auto;
          display: block;
        " />

        <p style="color: #666; margin-bottom: 20px">
            Please show this QR code at the canteen counter to collect your food.
        </p>

        <button onclick="window.location.href = 'student.html'" class="btn" style="
          background: var(--primary);
          padding: 10px 20px;
          border: none;
          border-radius: 5px;
          color: white;
          cursor: pointer;
          font-weight: bold;
        ">
            Return to Dashboard
        </button>
    </div>
    <div id="customAlertModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div
            style="background: white; padding: 30px; border-radius: 16px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <div id="customAlertIcon" style="font-size: 3.5rem; margin-bottom: 15px;"></div>
            <h3 id="customAlertTitle" style="color: #333; margin-bottom: 10px;">Alert</h3>
            <p id="customAlertMessage" style="color: #666; margin-bottom: 25px; font-size: 0.95rem;"></p>
            <button class="btn"
                style="width: 100%; border-radius: 10px; padding: 12px; font-size: 1rem; background: var(--primary); color: white; border: none; cursor: pointer;"
                onclick="closeCustomAlert()">Okay</button>
        </div>
    </div>

    <style>
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/payment.js"></script>
</body>

</html>
